// Convert UTC hour to local display
const utcToLocal = (utcHour, offset) => {
  let h = (utcHour + offset) % 24;
  if (h < 0) h += 24;
  return Math.floor(h);
};
const fmtHour = (h) => {
  const hr = Math.floor(h);
  const suffix = hr >= 12 ? "PM" : "AM";
  const display = hr % 12 === 0 ? 12 : hr % 12;
  return `${display}${suffix}`;
};
const fmtNum = (n) => {
  if (n >= 1e6) return `${(n / 1e6).toFixed(1)}M`;
  if (n >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
  return `${n}`;
};
const fmtNumFull = (n) => n.toLocaleString("en-US");

// THE 3 CORE FEATURES
// 1. TRENDING INSIGHTS - for a country, show top categories, avg views, best times
// 2. TITLE LAB - enter a title, get a score + suggestions based on real patterns

// Title scorer — scores a title against real trending-data signals from the selected country.
// Signals include: length, pattern match, power words, category keywords, brackets, exclaim,
// question, emoji, Title Case, numbers. Returns score 0-100 and a list of signals.
function scoreTitle(title, countryData, categoryName = null) {
  const t = title.trim();
  const len = t.length;
  const words = t.split(/\s+/).filter(Boolean);
  const wordCount = words.length;
  const hasEmoji = /[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(t);
  const hasQ = /\?/.test(t);
  const hasExclaim = /!/.test(t);
  const hasBrackets = /[\(\[]/.test(t);
  const hasNumber = /\b\d+\b/.test(t);

  const fs = countryData.feature_stats;
  const signals = [];
  const opportunities = []; // Tips for raising the score
  let score = 40; // base

  // ========= 1. LENGTH (±8) =========
  const lenBucket = countryData.title_length.reduce((best, b) => b.avg_views > best.avg_views ? b : best);
  if (len < 40 && lenBucket.bucket !== "short (<40)") {
    score -= 5;
    signals.push({ type: "warn", label: "Title is short", detail: `In ${countryData.country}, ${lenBucket.bucket} titles perform best on average.`, impact: 13 });
  } else if (len >= 40 && len < 70) {
    score += 8;
    signals.push({ type: "good", label: "Good length", detail: "Medium-length titles (40–70 chars) hit a sweet spot of clarity + keyword richness." });
  } else if (len >= 70 && len < 100) {
    score += 5;
    signals.push({ type: "good", label: "Long title", detail: "Long titles can work if packed with keywords — avoid stuffing." });
  } else if (len >= 100) {
    score -= 3;
    signals.push({ type: "warn", label: "Very long title", detail: "Over 100 chars risks truncation on mobile search.", impact: 11 });
  }

  // ========= 2. PATTERN MATCH (+18 max) — biggest new signal =========
  // Check if title structurally matches a top trending pattern from this country.
  if (countryData.title_patterns) {
    const patterns = [
      { id: "official_video", rx: /\(\s*Official\s*(?:Music\s*)?Video\s*\)/i, label: "(Official Video)" },
      { id: "official_trailer", rx: /\|\s*Official\s*Trailer/i, label: "| Official Trailer" },
      { id: "official_audio", rx: /\(\s*Official\s*Audio\s*\)/i, label: "(Official Audio)" },
      { id: "lyrics", rx: /\(?\s*Lyrics\s*\)?\s*$/i, label: "Lyrics" },
      { id: "i_tried", rx: /^I\s+Tried\s+/i, label: "I Tried ..." },
      { id: "i_built", rx: /^I\s+Built\s+/i, label: "I Built ..." },
      { id: "i_made", rx: /^I\s+Made\s+/i, label: "I Made ..." },
      { id: "how_to", rx: /^How\s+(?:to|I)\s+/i, label: "How to ..." },
      { id: "for_n_days", rx: /for\s+\d+\s+Days?/i, label: "for N Days" },
      { id: "in_n_minutes", rx: /in\s+\d+\s+(?:Minutes?|Hours?|Seconds?)/i, label: "in N Minutes/Hours" },
      { id: "vs", rx: /\svs\.?\s/i, label: "X vs Y" },
      { id: "part_n", rx: /Part\s+\d+/i, label: "Part N" },
      { id: "top_n", rx: /^Top\s+\d+\s+/i, label: "Top N" },
      { id: "review", rx: /\sReview\s*(?:\(|$)/i, label: "Review" },
      { id: "what_happens", rx: /^What\s+Happens\s+/i, label: "What Happens ..." },
      { id: "why_x", rx: /^Why\s+/i, label: "Why ..." },
      { id: "reacting_to", rx: /^Reacting\s+to\s+/i, label: "Reacting to ..." },
    ];
    let bestPatternMatch = null;
    for (const p of patterns) {
      const matchData = countryData.title_patterns.overall_patterns?.[p.id];
      if (p.rx.test(t) && matchData) {
        if (!bestPatternMatch || matchData.avg > bestPatternMatch.data.avg) {
          bestPatternMatch = { pattern: p, data: matchData };
        }
      }
    }
    if (bestPatternMatch) {
      // Scale bonus by how much this pattern beats country median views
      const median = countryData.title_patterns.country_median_views || 1;
      const ratio = bestPatternMatch.data.avg / median;
      // Log-scaled bonus: 2x median → +8, 10x median → +14, 100x median → +18
      const bonus = Math.min(18, Math.max(3, Math.round(3 + Math.log10(Math.max(ratio, 1.1)) * 7)));
      score += bonus;
      signals.push({
        type: "good",
        label: `Matches trending pattern: "${bestPatternMatch.pattern.label}"`,
        detail: `${bestPatternMatch.data.n} trending videos use this pattern in ${countryData.country} (avg ${fmtNum(bestPatternMatch.data.avg)} views). +${bonus} pts.`,
      });
    } else {
      opportunities.push({
        label: "Try a proven pattern",
        detail: `None of the top trending patterns match this title. Patterns like "I Tried ...", "How to ...", "(Official Video)", or "Part N" can add up to +18 points.`,
        impact: 18,
      });
    }
  }

  // ========= 3. BRACKETS (+10) =========
  if (hasBrackets) {
    const delta = ((fs.brackets.with_avg_views - fs.brackets.without_avg_views) / fs.brackets.without_avg_views * 100).toFixed(0);
    score += 10;
    signals.push({ type: "good", label: "Uses ( ) or [ ]", detail: `Trending videos with brackets average ${delta}% higher views vs. without — signals context.` });
  } else {
    opportunities.push({
      label: "Add brackets",
      detail: `${fs.brackets.with_share}% of trending titles in ${countryData.country} use ( ) or [ ]. Adding "(Official)", "[Live]", "(Part 1)" etc. would add +10 points.`,
      impact: 10,
    });
  }

  // ========= 4. POWER WORDS (+5 each, max +15) =========
  const wp = countryData.word_performance || [];
  const titleLower = t.toLowerCase();
  const matched = wp.filter(w => new RegExp(`\\b${w.word}\\b`, 'i').test(titleLower));
  if (matched.length > 0) {
    matched.slice(0, 3).forEach(m => {
      score += 5;
      signals.push({
        type: "good",
        label: `Power word: "${m.word}"`,
        detail: `Trending videos with "${m.word}" average ${fmtNum(m.avg_views)} views. +5 pts.`,
      });
    });
  } else if (wp.length > 0) {
    const topWords = wp.slice(0, 5).map(w => `"${w.word}"`).join(", ");
    opportunities.push({
      label: "Use a high-performing word",
      detail: `Top trending words in ${countryData.country} include ${topWords}. Each adds +5 points.`,
      impact: 5,
    });
  }

  // ========= 5. CATEGORY KEYWORDS (+4 each, max +8) =========
  // Match top tags for the user's selected category, if provided.
  if (categoryName && countryData.categories) {
    const cat = countryData.categories.find(c => c.name === categoryName);
    if (cat && countryData.top_tags) {
      // Derive category-relevant words from top_tags + examples. For simplicity,
      // use top_tags intersected with titles from that category's examples.
      const catExamples = countryData.examples_by_category?.[cat.id] || [];
      const catWordCounts = new Map();
      catExamples.forEach(ex => {
        const clean = ex.title.toLowerCase().replace(/[^\w\s]/g, ' ').split(/\s+/);
        clean.forEach(w => {
          if (w.length >= 4 && !/^\d+$/.test(w)) {
            catWordCounts.set(w, (catWordCounts.get(w) || 0) + 1);
          }
        });
      });
      const catRelevant = [...catWordCounts.entries()]
        .filter(([w, c]) => c >= 2)
        .map(([w]) => w);
      const catMatches = catRelevant.filter(w => new RegExp(`\\b${w}\\b`, 'i').test(titleLower));
      if (catMatches.length > 0) {
        catMatches.slice(0, 2).forEach(w => {
          score += 4;
          signals.push({
            type: "good",
            label: `Category keyword: "${w}"`,
            detail: `Common in trending ${cat.name} titles. +4 pts.`,
          });
        });
      }
    }
  }

  // ========= 6. EXCLAIM (±3) =========
  if (hasExclaim) {
    const delta = (fs.exclaim.with_avg_views - fs.exclaim.without_avg_views) / fs.exclaim.without_avg_views * 100;
    if (fs.exclaim.with_avg_views > fs.exclaim.without_avg_views) {
      score += 3;
      signals.push({ type: "good", label: "Exclamation mark", detail: `Titles with "!" average ${delta.toFixed(0)}% more views here — implies energy.` });
    } else {
      score -= 2;
      signals.push({ type: "warn", label: "Exclamation mark", detail: `In ${countryData.country}, "!" underperforms by ${Math.abs(delta).toFixed(0)}%.`, impact: 5 });
    }
  }

  // ========= 7. QUESTION (±4) =========
  if (hasQ) {
    const delta = (fs.question.with_avg_views - fs.question.without_avg_views) / fs.question.without_avg_views * 100;
    if (fs.question.with_avg_views < fs.question.without_avg_views) {
      score -= 4;
      signals.push({ type: "warn", label: "Question mark", detail: `In ${countryData.country}, questioning titles underperform by ${Math.abs(delta).toFixed(0)}%. Stronger declaratives often win.`, impact: 6 });
    } else {
      score += 2;
      signals.push({ type: "good", label: "Question hook", detail: `Questions average +${delta.toFixed(0)}% views here — your market responds to them.` });
    }
  }

  // ========= 8. EMOJI (+2) =========
  if (hasEmoji) {
    const delta = (fs.emoji.with_avg_views - fs.emoji.without_avg_views) / fs.emoji.without_avg_views * 100;
    score += 2;
    signals.push({ type: "good", label: "Emoji", detail: `Only ${fs.emoji.with_share}% of trending titles use emoji — you stand out (${delta > 0 ? "+" : ""}${delta.toFixed(0)}% vs. without).` });
  }

  // ========= 9. NUMBERS (+3) — trending titles love numbers =========
  if (hasNumber) {
    score += 3;
    signals.push({ type: "good", label: "Contains a number", detail: "Numbers ('10 Things', 'Top 5', 'in 2026') anchor expectations and correlate with higher CTR." });
  } else {
    opportunities.push({
      label: "Add a specific number",
      detail: `Titles with numbers ('10 ways', '3 reasons', 'Top 5') are more click-worthy and add +3 points.`,
      impact: 3,
    });
  }

  // ========= 10. TITLE CASE (+3) =========
  // Detect Title Case: most major words capitalized first letter.
  const bigWords = words.filter(w => w.length >= 4);
  const titleCaseWords = bigWords.filter(w => /^[A-Z]/.test(w)).length;
  const isTitleCase = bigWords.length >= 3 && titleCaseWords / bigWords.length >= 0.7;
  if (isTitleCase) {
    score += 3;
    signals.push({ type: "good", label: "Title Case", detail: "Proper capitalization reads as polished and professional." });
  }

  // ========= 11. ALL CAPS PENALTY =========
  const capsRatio = [...t].filter(c => /[A-Z]/.test(c)).length / Math.max(len, 1);
  if (capsRatio > 0.6) {
    score -= 6;
    signals.push({ type: "warn", label: "Too much uppercase", detail: "Excessive caps read as spam — platforms and viewers both penalize it.", impact: 6 });
  }

  // ========= 12. WORD COUNT PENALTY =========
  if (wordCount < 3) {
    score -= 6;
    signals.push({ type: "warn", label: "Very few words", detail: "Too little text = too few keywords for search/recommendation.", impact: 14 });
  }

  // Clamp
  score = Math.max(0, Math.min(100, Math.round(score)));

  // ========= BIGGEST OPPORTUNITY =========
  // Find the single tip that would raise the score most. Combines warn-type signals
  // (which show impact) and missing-opportunity tips.
  const allOps = [
    ...opportunities,
    ...signals.filter(s => s.type === "warn" && s.impact).map(s => ({
      label: `Fix: ${s.label}`,
      detail: s.detail + " Fixing this is the biggest single improvement available.",
      impact: s.impact,
    })),
  ];
  allOps.sort((a, b) => b.impact - a.impact);
  const biggestOpp = allOps[0] || null;

  // Append all opportunities as tips
  opportunities.forEach(op => {
    signals.push({ type: "tip", label: op.label, detail: op.detail });
  });

  return { score, signals, len, wordCount, biggestOpp };
}

// Generate title templates from real data patterns
// Fill a template string with the user's topic. Templates use {X}, {song}, {Y}, N, etc.
// - {X} → topic
// - {song} → a short generic placeholder for a second noun slot
// - {Y} → another contextual noun
// - "N" standalone → common round number (e.g., "30")
function fillTemplate(template, topic) {
  let t = template;
  t = t.replace(/\{X\}/g, topic);
  t = t.replace(/\{song\}/g, "Track Title");
  t = t.replace(/\{Y\}/g, "Competitor");
  // Handle "for N Days" / "in N Minutes" / "Top N" — pick sensible defaults
  t = t.replace(/\bN\s+Days\b/gi, "30 Days");
  t = t.replace(/\bN\s+Minutes\b/gi, "10 Minutes");
  t = t.replace(/\bN\s+Hours\b/gi, "24 Hours");
  t = t.replace(/\bTop\s+N\b/gi, "Top 10");
  t = t.replace(/\bPart\s+N\b/gi, "Part 1");
  t = t.replace(/\bEpisode\s+N\b/gi, "Episode 1");
  t = t.replace(/\[time\/money\]/g, "24 Hours");
  return t;
}

function generateTitles(countryData, categoryName, topic) {
  if (!countryData.title_patterns) return [];
  const cat = countryData.categories.find(c => c.name === categoryName);
  const catId = cat ? String(cat.id) : null;

  // Source of patterns: prefer category-specific if available, else overall
  const catPatterns = catId ? (countryData.title_patterns.per_category_patterns[catId] || {}) : {};
  const overall = countryData.title_patterns.overall_patterns || {};

  // Build a merged list. Mark category-specific ones as such.
  const merged = [];
  Object.keys(catPatterns).forEach((pid) => {
    const p = catPatterns[pid];
    merged.push({ t: p.t, n: p.n, avg: p.avg, ex: p.ex, ex_views: p.ex_views, id: pid, inCategory: true });
  });
  Object.keys(overall).forEach((pid) => {
    if (!catPatterns[pid]) {
      const p = overall[pid];
      merged.push({ t: p.t, n: p.n, avg: p.avg, ex: p.ex, ex_views: p.ex_views, id: pid, inCategory: false });
    }
  });

  // Sort by avg_views descending — highest-performing patterns first
  merged.sort((a, b) => b.avg - a.avg);

  // Take top 6, fill each with the user's topic
  return merged.slice(0, 6).map(p => ({
    title: fillTemplate(p.t, topic),
    template: p.t,
    matchCount: p.n,
    avgViews: p.avg,
    example: p.ex,
    exampleViews: p.ex_views,
    inCategory: p.inCategory,
  }));
}

function InsightsTab({ cd, meta, topHours, bestDay }) {
  const topCats = cd.categories.slice(0, 8);
  const hourChartData = cd.hours.map(h => ({
    hour: fmtHour(utcToLocal(h.hour, meta.utcOffset)),
    hourRaw: utcToLocal(h.hour, meta.utcOffset),
    avg_views: h.avg_views,
    count: h.count,
  })).sort((a, b) => a.hourRaw - b.hourRaw);

  return (
    <div>
      {/* ======== TOP CATEGORIES ======== */}
      <Section number="01.1" title="What Categories Actually Trend" kicker="Ranked by # of videos that made trending in your market">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 }}>
          {topCats.map((c, i) => (
            <div
              key={c.id}
              style={{
                background: i === 0 ? C.ink : "transparent",
                color: i === 0 ? C.cream : C.ink,
                border: `1.5px solid ${C.ink}`,
                padding: 18,
                position: "relative",
              }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.1em", opacity: 0.6 }}>#{String(i+1).padStart(2,'0')}</span>
                <span style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.05em", color: i === 0 ? C.coral : C.coral }}>
                  {c.video_count} videos
                </span>
              </div>
              <div style={{ fontFamily: FONT_DISPLAY, fontWeight: 800, fontSize: 22, lineHeight: 1.1, marginBottom: 12, letterSpacing: "-0.02em" }}>
                {c.name}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 12 }}>
                <Stat label="Avg views" value={fmtNum(c.avg_views)} inverted={i===0}/>
                <Stat label="Median" value={fmtNum(c.median_views)} inverted={i===0}/>
                <Stat label="Like rate" value={`${c.like_rate}%`} inverted={i===0}/>
                <Stat label="Comment rate" value={`${c.comment_rate}%`} inverted={i===0}/>
              </div>
            </div>
          ))}
        </div>
      </Section>

      {/* ======== BEST TIMES ======== */}
      <Section number="01.2" title="When to Publish" kicker={`Times shown in ${meta.localLabel}, converted from the video's published UTC hour`}>
        <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 24, alignItems: "start" }} className="mobile-stack">
          {/* Chart */}
          <div style={{ border: `1.5px solid ${C.ink}`, padding: "20px 16px 8px", background: "rgba(255,255,255,0.4)" }}>
            <div style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.1em", color: C.fade, marginBottom: 12 }}>
              AVG VIEWS BY PUBLISH HOUR ({meta.localLabel})
            </div>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={hourChartData}>
                <CartesianGrid stroke={C.creamDeep} vertical={false} />
                <XAxis dataKey="hour" interval={2} tick={{ fontFamily: FONT_MONO, fontSize: 10, fill: C.ink }} stroke={C.ink} />
                <YAxis tick={{ fontFamily: FONT_MONO, fontSize: 10, fill: C.ink }} stroke={C.ink} tickFormatter={fmtNum} />
                <Tooltip
                  contentStyle={{ fontFamily: FONT_MONO, fontSize: 11, background: C.ink, border: "none", color: C.cream }}
                  formatter={(v) => fmtNum(v)}
                  labelStyle={{ color: C.coral }}
                  cursor={{ fill: "rgba(232,67,46,0.12)" }}
                />
                <Bar dataKey="avg_views" radius={[2, 2, 0, 0]}>
                  {hourChartData.map((d, i) => {
                    const isTop = topHours.some(t => utcToLocal(t.hour, meta.utcOffset) === d.hourRaw);
                    return <Cell key={i} fill={isTop ? C.coral : C.ink} />;
                  })}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Right column - top 3 windows + best day */}
          <div>
            <div style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.1em", color: C.fade, marginBottom: 12 }}>
              TOP 3 PUBLISH WINDOWS

            {topHours.map((h, i) => (
              <div key={i} style={{
                borderLeft: `4px solid ${C.coral}`,
                paddingLeft: 14,
                marginBottom: 16,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
                  <span style={{ fontFamily: FONT_DISPLAY, fontSize: 32, fontWeight: 800, letterSpacing: "-0.02em" }}>
                    {fmtHour(h.localHour)}
                  </span>
                  <span style={{ fontFamily: FONT_MONO, fontSize: 10, color: C.fade }}>#{i+1}</span>
                </div>
                <div style={{ fontSize: 13, color: C.ink }}>
                  <strong style={{ fontFamily: FONT_MONO }}>{fmtNum(h.avg_views)}</strong> avg views · {h.count} trending videos
                </div>
              </div>
            ))}

            <div style={{ marginTop: 20, padding: "14px 16px", background: C.ink, color: C.cream }}>
              <div style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.1em", color: C.coral, marginBottom: 4 }}>
                BEST DAY OF THE WEEK
              </div>
              <div style={{ fontFamily: FONT_DISPLAY, fontSize: 32, fontWeight: 800 }}>
                {bestDay.day}day
              </div>
              <div style={{ fontSize: 12, opacity: 0.8, marginTop: 2 }}>
                Avg <strong>{fmtNum(bestDay.avg_views)}</strong> views · {bestDay.count} trending videos
              </div>
            </div>
          </div>
        </div>
      </Section>

      {/* ======== TITLE PATTERNS ======== */}
      <Section number="01.3" title="Title Patterns That Win" kicker="How trending titles with each feature compare to those without">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
          <FeatureCard
            label="() or [] brackets"
            stats={cd.feature_stats.brackets}
            insight='"(Official Video)", "[Live]", "(Part 1)" — brackets signal context.'
          />
          <FeatureCard
            label="Exclamation mark !"
            stats={cd.feature_stats.exclaim}
            insight="Conveys energy. Works for reactions, challenges, reveals."
          />
          <FeatureCard
            label="Emoji 🔥"
            stats={cd.feature_stats.emoji}
            insight="Less common — used strategically it breaks pattern in feed."
          />
          <FeatureCard
            label="Question mark ?"
            stats={cd.feature_stats.question}
            insight="Double-edged: curiosity helps, but many markets prefer declaratives."
          />
        </div>

        {/* Top power words */}
        <div style={{ marginTop: 28 }}>
          <div style={{ fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.1em", color: C.fade, marginBottom: 12 }}>
            HIGHEST-PERFORMING WORDS IN TRENDING TITLES
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {[...cd.word_performance]
              .sort((a, b) => b.avg_views - a.avg_views)
              .slice(0, 12)
              .map((w, i) => (
                <div
                  key={w.word}
                  style={{
                    border: `1.5px solid ${C.ink}`,
                    padding: "8px 12px",
                    fontFamily: FONT_MONO,
                    fontSize: 12,
                    background: i < 3 ? C.coral : "transparent",
                    color: i < 3 ? C.cream : C.ink,
                  }}
                >
                  <strong style={{ letterSpacing: "0.02em" }}>{w.word}</strong>
                  <span style={{ fontSize: 10, opacity: 0.75, marginLeft: 8 }}>
                    {fmtNum(w.avg_views)} avg
                  </span>
                </div>
              ))}
          </div>
        </div>
      </Section>
    </div>
  );
}

function Stat({ label, value, inverted }) {
  return (
    <div>
      <div style={{ fontFamily: FONT_MONO, fontSize: 9, opacity: 0.6, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</div>
      <div style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 16, marginTop: 2 }}>{value}</div>
    </div>
  );
}

function FeatureCard({ label, stats, insight }) {
  const delta = ((stats.with_avg_views - stats.without_avg_views) / stats.without_avg_views * 100);
  const positive = delta > 0;
  return (
    <div style={{ border: `1.5px solid ${C.ink}`, padding: 14, background: "rgba(255,255,255,0.3)" }}>
      <div style={{ fontFamily: FONT_MONO, fontSize: 11, letterSpacing: "0.04em", marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
        <span style={{
          fontFamily: FONT_DISPLAY,
          fontSize: 32,
          fontWeight: 800,
          letterSpacing: "-0.02em",
          color: positive ? C.moss : C.coral,
        }}>
          {positive ? "+" : ""}{delta.toFixed(0)}%
        </span>
        <span style={{ fontFamily: FONT_MONO, fontSize: 10, color: C.fade }}>vs. without</span>
      </div>
      <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: C.fade, marginBottom: 10, letterSpacing: "0.03em" }}>
        {stats.with_share}% of trending titles use it
      </div>
      <div style={{ fontSize: 11, lineHeight: 1.4, color: C.fade }}>{insight}</div>
    </div>
  );
}

function Section({ number, title, kicker, children }) {
  return (
    <section style={{ marginBottom: 56 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 6, flexWrap: "wrap" }}>
        <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: C.coral, letterSpacing: "0.15em" }}>
          §{number}
        </div>
        <h2 style={{
          fontFamily: FONT_DISPLAY,
          fontWeight: 800,
          fontSize: "clamp(26px, 3.2vw, 40px)",
          letterSpacing: "-0.025em",
          margin: 0,
          lineHeight: 1,
        }}>
          {title}
        </h2>
      </div>
      {kicker && (
        <div style={{ fontFamily: FONT_DISPLAY, fontStyle: "italic", color: C.fade, fontSize: 14, marginBottom: 20 }}>
          {kicker}
        </div>
      )}
      {children}
    </section>
  );
}

function TitleLab({ cd, meta }) {

  const result = useMemo(() => (title.trim().length > 0 ? scoreTitle(title, cd) : null), [title, cd]);

  const scoreBarColor = (score) => {
    if (score >= 75) return C.moss;
    if (score >= 50) return C.mustard;
    return C.coral;
  };

  const sampleTitles = [
    { title: "vlog", label: "Try a weak title", color: C.coral },
    { title: "My Day at the Beach 2026", label: "Try an average title", color: C.mustard },
    { title: "I Tried Every Coffee Shop in 24 Hours", label: "Try a pattern-match title", color: C.moss },
    { title: "Why Everyone Quit Their Job (Official Video)", label: "Try a near-perfect title", color: C.moss },
  ];

  return (
    <div>
      <Section number="02.1" title="Paste your title. We'll score it." kicker={`Scored against the patterns of ${fmtNumFull(cd.total_videos)} trending videos in ${meta.name}.`}>
        <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 28, alignItems: "start" }} className="mobile-stack">
          {/* LEFT - Input */}

            <label style={{
              display: "block",

                fontSize: 22,

                outline: "none",
                lineHeight: 1.3,
                letterSpacing: "-0.01em",
              }}

              <span>{title.length} chars · {title.trim().split(/\s+/).filter(Boolean).length} words</span>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>

                  <button
                    key={s.title}

                    style={{
                      border: `1px solid ${s.color}`,
                      background: "transparent",
                      padding: "8px 10px",
                      fontFamily: FONT_MONO,
                      fontSize: 10,
                      cursor: "pointer",
                      color: C.ink,
                      letterSpacing: "0.02em",
                      textAlign: "left",
                      lineHeight: 1.4,
                    }}

                    <div style={{ color: s.color, fontWeight: 700, marginBottom: 2 }}>{s.label} →</div>

                {item.label}
              </div>
              <div style={{ fontSize: 13, lineHeight: 1.5, color: C.fade }}>
                {item.detail}
              </div>
            </div>
          ))}
        </div>
      </Section>

      <Section number="04.5" title="Data strategy — one glance" kicker="Key decisions in the pipeline, and why.">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12 }}>
          <DecisionCard
            decision="Dedupe on video_id"
            rationale="Videos appear in multiple trending snapshots. Keeping all would double-count long-trending videos. We keep one row per video (the highest-view snapshot) so each video weights equally."
          />
          <DecisionCard
            decision="Country-local hour conversion"
            rationale="publish_time is UTC. A video published at 12:00 UTC looks different to a US creator (7 AM ET) vs. a JP creator (9 PM JST). We convert once at render time based on selected market."
          />
          <DecisionCard
            decision="Filter patterns ≥5 matches"
            rationale="A pattern with 2 matches and a 50M avg is likely a lucky fluke. Minimum 5 matches removes noise; in-category filter adds another threshold (above category median)."
          />
          <DecisionCard
            decision="Store data inline, not via API"
            rationale="178K rows compressed fit in 177KB of JSON. Inlining gives instant loads, zero latency, and offline usability — which matches how creators actually work."
          />
        </div>
      </Section>
    </div>
  );
}

function PipelineStep({ num, title, detail }) {
  return (
    <div style={{ borderLeft: `3px solid ${C.coral}`, paddingLeft: 12 }}>
      <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: C.coral, letterSpacing: "0.1em" }}>
        STEP {num}
      </div>
      <div style={{ fontFamily: FONT_DISPLAY, fontSize: 17, fontWeight: 700, letterSpacing: "-0.01em", marginTop: 2, marginBottom: 6 }}>
        {title}
      </div>
      <div style={{ fontSize: 12, color: C.fade, lineHeight: 1.4 }}>
        {detail}
      </div>
    </div>
  );
}

function BigStat({ number, label }) {
  return (
    <div style={{ padding: "14px 16px", background: C.ink, color: C.cream }}>
      <div style={{ fontFamily: FONT_DISPLAY, fontSize: 28, fontWeight: 800, letterSpacing: "-0.02em", lineHeight: 1 }}>
        {number}
      </div>
      <div style={{ fontFamily: FONT_MONO, fontSize: 10, opacity: 0.7, marginTop: 6, letterSpacing: "0.03em", lineHeight: 1.3 }}>
        {label}
      </div>
    </div>
  );
}

function DecisionCard({ decision, rationale }) {
  return (
    <div style={{ border: `1.5px solid ${C.ink}`, padding: 14, background: "rgba(255,255,255,0.3)" }}>
      <div style={{ fontFamily: FONT_DISPLAY, fontSize: 15, fontWeight: 700, letterSpacing: "-0.01em", marginBottom: 6 }}>
        {decision}
      </div>
      <div style={{ fontSize: 12, color: C.fade, lineHeight: 1.5 }}>
        {rationale}
      </div>
    </div>
  );
}
